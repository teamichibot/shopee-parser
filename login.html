<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login Ichibot Tracker">
  <title>Masuk — Ichibot Tracker</title>
  <link rel="stylesheet" href="assets/common.css">
</head>
<body>

  <div id="app-nav"></div>

  <main class="login-shell">
    <div class="login-card">
      <h1 class="login-title">Masuk</h1>
      <p class="login-subtitle">Akses dashboard tracker kompetitor Ichibot.</p>

      <div class="msg-box msg-error" id="msg-error">
        <strong>Gagal masuk</strong>
        <span id="msg-error-text"></span>
      </div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="email"
            class="form-input"
            id="email"
            name="email"
            autocomplete="username"
            required
            placeholder="kamu@ichibot.id"
            autofocus
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            class="form-input"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            placeholder="••••••••"
          >
        </div>

        <div class="login-actions">
          <button class="btn-primary" type="submit" id="btn-submit">Masuk</button>
        </div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/supabase.js"></script>
  <script>
    (async function () {
      // Redirect ke stores.html kalau sudah login
      await App.redirectIfAuthed('stores.html');

      // Render nav (akan menampilkan "Masuk" / parser link)
      App.renderNav('login');

      const form = document.getElementById('login-form');
      const emailInput = document.getElementById('email');
      const passwordInput = document.getElementById('password');
      const btn = document.getElementById('btn-submit');
      const msgError = document.getElementById('msg-error');
      const msgErrorText = document.getElementById('msg-error-text');

      function showError(msg) {
        msgErrorText.textContent = msg;
        msgError.classList.add('visible');
      }
      function hideError() {
        msgError.classList.remove('visible');
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const email = emailInput.value.trim();
        const password = passwordInput.value;

        if (!email || !password) {
          showError('Email dan password wajib diisi.');
          return;
        }

        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Memproses…';

        try {
          const { data, error } = await App.signIn(email, password);
          if (error) {
            const msg =
              error.message === 'Invalid login credentials'
                ? 'Email atau password salah.'
                : error.message;
            showError(msg);
            btn.disabled = false;
            btn.innerHTML = originalText;
            return;
          }
          if (data && data.session) {
            // Sukses — redirect ke stores
            window.location.replace('stores.html');
            return;
          }
          showError('Sesi tidak terbuat. Coba lagi.');
        } catch (err) {
          showError(err.message || 'Terjadi kesalahan tak terduga.');
        } finally {
          if (!document.hidden) {
            btn.disabled = false;
            btn.innerHTML = originalText;
          }
        }
      });
    })();
  </script>
</body>
</html>
